<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMPAN HUB | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --accent: #00f2ff; }
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; min-height: 100vh; padding-bottom: 5rem; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; transition: 0.3s; }
        .online-glow { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .offline-glow { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        
        /* Bounce Animation kwa Server Hewa */
        .bounce-box { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        .owner-link {
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.1), transparent);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto p-6">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black italic tracking-tighter">JAMPAN <span class="text-cyan-400">HUB</span></h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-[5px] mt-2 font-bold">Jampan Tech Fleet Control</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="server-list">
            <!-- Servers 1-5 yataingizwa na JS hapa -->
        </div>

        <!-- SERVER HEWA (COMING SOON) -->
        <div class="grid grid-cols-1 mt-6">
            <div class="glass-card p-8 text-center border-dashed border-2 border-cyan-900/30 bounce-box">
                <div class="flex justify-between mb-4">
                    <span class="text-[10px] font-bold text-gray-500 uppercase text-xs">Server 06</span>
                    <span class="text-[10px] font-bold text-cyan-400 animate-pulse">UPCOMING</span>
                </div>
                <i class="fa-solid fa-rocket text-3xl text-gray-700 mb-4"></i>
                <h2 class="text-xl font-bold mb-2 italic text-gray-500">COMING SOON</h2>
                <p class="text-[10px] text-gray-600 uppercase tracking-widest">Expansion in Progress...</p>
            </div>
        </div>

        <!-- CONTACT OWNER SECTION -->
        <div class="mt-16 text-center owner-link py-8">
            <p class="text-[10px] text-gray-500 uppercase tracking-[3px] mb-4">Developed & Managed By</p>
            <a href="https://jampan47.vercel.app/" target="_blank" class="inline-flex items-center gap-3 bg-white/5 px-6 py-3 rounded-full border border-white/10 hover:border-cyan-400 transition-all group">
                <img src="https://files.catbox.moe/rdsuei.png" class="w-8 h-8 rounded-full border border-cyan-400" alt="Kelvin">
                <div class="text-left">
                    <p class="text-xs font-bold text-white group-hover:text-cyan-400">Kelvin Jampan</p>
                    <p class="text-[8px] text-gray-500">Click to Contact Owner</p>
                </div>
            </a>
            <p class="mt-6 text-[9px] text-gray-700 font-bold uppercase">&copy; 2026 JAMPAN XMD</p>
        </div>
    </div>

    <script>
        const servers = [
            { id: "01", url: "https://jampan-9bcf670ac9fa.herokuapp.com/", icon: "fa-bolt" },
            { id: "02", url: "#", icon: "fa-server" },
            { id: "03", url: "#", icon: "fa-shield" },
            { id: "04", url: "#", icon: "fa-cloud" },
            { id: "05", url: "#", icon: "fa-microchip" }
        ];

        function render() {
            const list = document.getElementById('server-list');
            servers.forEach(s => {
                const isOnline = s.url.includes('9bcf');
                list.innerHTML += `
                    <div class="glass-card p-8 text-center hover:scale-105">
                        <div class="flex justify-between mb-6">
                            <span class="text-[10px] font-bold text-cyan-400 uppercase">Server ${s.id}</span>
                            <div class="w-2 h-2 rounded-full ${isOnline ? 'online-glow' : 'offline-glow'}"></div>
                        </div>
                        <i class="fa-solid ${s.icon} text-3xl ${isOnline ? 'text-blue-400' : 'text-gray-700'} mb-4"></i>
                        <h2 class="text-lg font-bold mb-6 italic uppercase">${isOnline ? 'Jampan Xmd' : 'Inactive'}</h2>
                        <a href="${s.url}" class="block w-full py-3 rounded-xl ${isOnline ? 'bg-blue-600' : 'bg-white/5 text-gray-600'} font-bold text-[10px] uppercase tracking-widest">
                            ${isOnline ? 'Link Device' : 'Offline'}
                        </a>
                    </div>
                `;
            });
        }
        render();
    </script>
</body>
</html>
