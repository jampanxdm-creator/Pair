<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMPAN XMD | Hub Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Poppins', sans-serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }

        /* SWIPEABLE SIDEBAR AD */
        #sidebar-ad {
            position: fixed; bottom: 25px; right: 20px; width: 280px;
            background: rgba(15, 23, 42, 0.98); border: 1px solid var(--accent);
            border-radius: 1.5rem; padding: 20px; z-index: 9999;
            backdrop-filter: blur(15px); transition: transform 0.3s ease, right 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            cursor: grab; touch-action: none; user-select: none;
            box-shadow: 0 15px 40px rgba(0, 242, 255, 0.15);
            display: none; /* Hide initially */
        }
        #sidebar-ad.active { display: block; animation: slideIn 0.6s forwards; }
        
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        .swipe-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: -10px auto 10px; }

        /* Dashboard UI */
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; transition: 0.3s; }
        .bounce-anim { animation: bounce 2.5s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="p-6">

    <!-- 🎯 SWIPEABLE SIDEBAR AD (Mtego wa Swipe) -->
    <div id="sidebar-ad" onmousedown="startSwipe(event)" ontouchstart="startSwipe(event)">
        <div class="swipe-handle"></div>
        <div class="text-center">
            <div class="mb-3"><i class="fa-brands fa-youtube text-5xl text-red-600"></i></div>
            <h3 class="text-[11px] font-black uppercase tracking-widest text-white">Join Community</h3>
            <p class="text-[9px] text-gray-500 mb-4 font-bold">Swipe right to dismiss or click below</p>
            <button onclick="openYT()" class="w-full py-3 bg-red-600 rounded-xl font-black text-[10px] tracking-widest">SUBSCRIBE</button>
        </div>
    </div>

    <!-- Header -->
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-12">
            <div class="w-16 h-16 bg-blue-600/20 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
                <span class="text-2xl font-black italic text-blue-400">JX</span>
            </div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">JAMPAN <span class="text-cyan-400">HUB</span></h1>
            <p class="text-[9px] text-gray-600 uppercase tracking-[4px] mt-2 font-bold">Select Active Server</p>
        </div>

        <!-- Servers Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="glass-card p-8 text-center flex flex-col justify-between hover:border-cyan-400">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[9px] font-bold text-cyan-400 px-3 py-1 rounded-full border border-cyan-400/20 uppercase">Server 01</span>
                    <span class="text-[8px] text-green-500 font-bold animate-pulse">● Online</span>
                </div>
                <i class="fa-solid fa-bolt text-3xl text-blue-400 mb-4"></i>
                <h2 class="text-lg font-bold italic mb-8 italic">JAMPAN XMD V1</h2>
                <a href="https://jampan-9bcf670ac9fa.herokuapp.com/" target="_blank" class="py-4 rounded-2xl bg-blue-600 font-bold text-white uppercase text-[9px] tracking-widest">Link Device</a>
            </div>

            <!-- More Offline Cards -->
            <div class="glass-card p-8 text-center opacity-40"><i class="fa-solid fa-server text-3xl text-gray-700 mb-4 mt-8"></i><p class="text-[8px] font-bold text-gray-700 uppercase">Offline</p></div>
            <div class="glass-card p-8 text-center opacity-40"><i class="fa-solid fa-cloud text-3xl text-gray-700 mb-4 mt-8"></i><p class="text-[8px] font-bold text-gray-700 uppercase">Offline</p></div>
            
            <!-- SERVER 06 BOUNCE -->
            <div class="glass-card p-8 border-dashed border-cyan-400/20 flex flex-col items-center justify-center bounce-anim">
                <i class="fa-solid fa-rocket text-cyan-400 text-xl mb-2"></i>
                <h3 class="font-black text-[9px] uppercase tracking-widest text-cyan-400">Soon</h3>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="mt-20 text-center pb-10">
            <a href="https://jampan47.vercel.app/" target="_blank" class="inline-flex items-center gap-3 bg-white/5 px-6 py-2 rounded-full border border-white/10 hover:border-cyan-400 transition-all">
                <img src="https://files.catbox.moe/rdsuei.png" class="w-8 h-8 rounded-full border border-cyan-400">
                <span class="text-[9px] font-black text-white uppercase tracking-[2px]">by kelvin jampan</span>
            </a>
            <div class="mt-8 flex justify-center gap-6 text-gray-800 text-lg">
                <i class="fa-solid fa-code"></i><i class="fa-solid fa-terminal"></i><i class="fa-solid fa-database"></i>
            </div>
        </div>
    </div>

    <script>
        const YT_APP = "intent://www.youtube.com/@jampani-xmd/#Intent;package=com.google.android.youtube;scheme=https;end";
        let startX, currentTranslate = 0, isSwiping = false;
        const ad = document.getElementById('sidebar-ad');

        function openYT() { window.location.href = YT_APP; }

        // Logic ya Swipe
        function startSwipe(e) {
            isSwiping = true;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            ad.style.transition = 'none';
        }

        window.onmousemove = window.ontouchmove = (e) => {
            if (!isSwiping) return;
            const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const walk = x - startX;
            if (walk > 0) { // Swipe kulia tu
                currentTranslate = walk;
                ad.style.transform = `translateX(${walk}px)`;
                ad.style.opacity = 1 - (walk / 300);
            }
        };

        window.onmouseup = window.ontouchend = () => {
            if (!isSwiping) return;
            isSwiping = false;
            ad.style.transition = 'transform 0.3s ease, opacity 0.3s';
            if (currentTranslate > 120) { // Kama imesogea mbali, itoe
                ad.style.transform = `translateX(150%)`;
                setTimeout(() => { ad.classList.remove('active'); }, 300);
            } else { // Rudisha nafasi ya mwanzo
                ad.style.transform = `translateX(0)`;
                ad.style.opacity = 1;
            }
            currentTranslate = 0;
        };

        // Ionyeshe baada ya sekunde 4
        setTimeout(() => ad.classList.add('active'), 4000);
        // Iirudishe kila sekunde 45
        setInterval(() => ad.classList.add('active'), 45000);
    </script>
</body>
</html>
